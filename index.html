<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NSB Guild</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans KR", sans-serif;
      background: #0f172a;
      color: #f8fafc;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: #1f2937;
      color: #fff;
      margin-top: 8px;
      margin-bottom: 12px;
    }

    button {
      cursor: pointer;
      background: #2563eb;
      border: none;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .member {
      padding: 12px;
      border-radius: 12px;
      background: #1f2937;
      margin-bottom: 10px;
    }

    .sub {
      color: #cbd5e1;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 id="siteTitle">길드 페이지</h1>
      <div class="sub" id="noticeText">불러오는 중...</div>
    </div>

    <div class="grid">
      <div class="card">
        <h2 id="loginTitle">로그인</h2>
        <input type="text" id="mainName" placeholder="본캐명 입력" />
        <button id="loginButton">입장하기</button>
        <div id="loginResult" class="sub"></div>
      </div>

      <div class="card">
        <h2>시간 선택</h2>
        <select id="slotSelect">
          <option value="">시간 선택</option>
        </select>
        <button id="loadMembersButton">가능 캐릭 보기</button>
      </div>
    </div>

    <div class="card hidden" id="accountBox">
      <h2>계정 정보</h2>
      <div id="accountInfo"></div>
    </div>

    <div class="card hidden" id="charBox">
      <h2>내 캐릭터</h2>
      <div id="charList"></div>
    </div>

    <div class="card hidden" id="slotMemberBox">
      <h2>선택 시간 가능 캐릭</h2>
      <div id="slotMemberList"></div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwOlszRW-sCVG7WH8hlWcwULUqg44KNg2u3ASgp16itsVEZpfRtNoFGnkiB0-uqBIqnFA/exec";

    async function callApi(params = {}) {
      const url = new URL(SCRIPT_URL);
      Object.entries(params).forEach(([key, value]) => {
        url.searchParams.set(key, value);
      });

      const res = await fetch(url.toString());
      return await res.json();
    }

    async function initPage() {
      try {
        const data = await callApi({ action: "init" });

        if (!data.ok) {
          alert(data.message || "초기화 실패");
          return;
        }

        const text = data.text || {};
        const timeSlots = data.timeSlots || [];

        document.getElementById("siteTitle").innerText = text.site_title || "NSB Guild";
        document.getElementById("noticeText").innerText = text.notice_text || "";
        document.getElementById("loginTitle").innerText = text.login_title || "로그인";
        document.getElementById("mainName").placeholder = text.login_placeholder || "본캐명 입력";
        document.getElementById("loginButton").innerText = text.login_button || "입장하기";

        const slotSelect = document.getElementById("slotSelect");
        timeSlots.forEach(slot => {
          const option = document.createElement("option");
          option.value = slot.slot_id;
          option.textContent = `${slot.요일} ${slot.시간}`;
          slotSelect.appendChild(option);
        });
      } catch (error) {
        alert("초기화 오류: " + error.message);
      }
    }

    async function login() {
      const mainName = document.getElementById("mainName").value.trim();
      const loginResult = document.getElementById("loginResult");

      if (!mainName) {
        loginResult.innerText = "본캐명을 입력해주세요.";
        return;
      }

      try {
        const data = await callApi({
          action: "login",
          mainName
        });

        loginResult.innerText = data.message || "";

        if (!data.ok) return;

        const accountBox = document.getElementById("accountBox");
        const charBox = document.getElementById("charBox");
        const accountInfo = document.getElementById("accountInfo");
        const charList = document.getElementById("charList");

        accountBox.classList.remove("hidden");
        charBox.classList.remove("hidden");

        accountInfo.innerHTML = `
          <div class="member">
            <div><strong>본캐명:</strong> ${data.account?.본캐명 || ""}</div>
            <div><strong>상태:</strong> ${data.account?.상태 || ""}</div>
            <div><strong>권한:</strong> ${data.account?.role || ""}</div>
          </div>
        `;

        const characters = data.characters || [];
        if (!characters.length) {
          charList.innerHTML = `<div class="sub">등록된 캐릭터가 없습니다.</div>`;
          return;
        }

        charList.innerHTML = characters.map(char => `
          <div class="member">
            <div><strong>${char.캐릭명 || ""}</strong></div>
            <div class="sub">구분: ${char.본부캐구분 || ""}</div>
            <div class="sub">클래스: ${char.클래스 || ""}</div>
            <div class="sub">전투력구간: ${char.전투력구간 || ""}</div>
            <div class="sub">전투력값: ${char.전투력값 || ""}</div>
            <div class="sub">메모: ${char.메모 || ""}</div>
          </div>
        `).join("");
      } catch (error) {
        loginResult.innerText = "로그인 오류: " + error.message;
      }
    }

    async function loadMembersBySlot() {
      const slotId = document.getElementById("slotSelect").value;
      if (!slotId) {
        alert("시간을 선택해주세요.");
        return;
      }

      try {
        const data = await callApi({
          action: "getAvailability",
          slotId
        });

        if (!data.ok) {
          alert(data.message || "불러오기 실패");
          return;
        }

        const box = document.getElementById("slotMemberBox");
        const list = document.getElementById("slotMemberList");
        box.classList.remove("hidden");

        const members = data.members || [];
        if (!members.length) {
          list.innerHTML = `<div class="sub">가능한 캐릭터가 없습니다.</div>`;
          return;
        }

        list.innerHTML = members.map(member => `
          <div class="member">
            <div><strong>${member.캐릭명 || ""}</strong> (${member.본부캐구분 || ""})</div>
            <div class="sub">계정: ${member.본캐명 || ""}</div>
            <div class="sub">클래스: ${member.클래스 || ""}</div>
            <div class="sub">전투력구간: ${member.전투력구간 || ""}</div>
            <div class="sub">전투력값: ${member.전투력값 || ""}</div>
            <div class="sub">메모: ${member.메모 || ""}</div>
          </div>
        `).join("");
      } catch (error) {
        alert("불러오기 오류: " + error.message);
      }
    }

    document.getElementById("loginButton").addEventListener("click", login);
    document.getElementById("loadMembersButton").addEventListener("click", loadMembersBySlot);

    initPage();
  </script>
</body>
</html>
