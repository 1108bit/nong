<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>시간 등록</title>
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    .availability-page {
      min-height: 100vh;
      padding: 24px 16px 40px;
      background:
        radial-gradient(circle at top, rgba(0, 212, 255, 0.12), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.08), transparent 22%),
        linear-gradient(180deg, #020617 0%, #0f172a 100%);
    }

    .availability-shell {
      max-width: 900px;
      margin: 0 auto;
    }

    .availability-card {
      background: linear-gradient(180deg, rgba(8, 15, 28, 0.82) 0%, rgba(10, 18, 32, 0.72) 100%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(16px);
      margin-bottom: 16px;
    }

    .availability-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .availability-title {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      color: #f8fafc;
    }

    .availability-desc {
      margin: 8px 0 0;
      color: #94a3b8;
      font-size: 14px;
    }

    .character-select {
      width: 100%;
      height: 52px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #f8fafc;
      padding: 0 14px;
      font-size: 15px;
      outline: none;
    }

    .grid-title {
      margin: 0 0 12px;
      font-size: 17px;
      font-weight: 800;
      color: #f8fafc;
    }

    .time-grid {
      display: grid;
      grid-template-columns: 100px repeat(5, 1fr);
      gap: 8px;
      align-items: stretch;
    }

    .cell {
      min-height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      padding: 8px;
      box-sizing: border-box;
    }

    .cell.head {
      background: rgba(255,255,255,0.06);
      color: #cbd5e1;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .cell.time {
      background: rgba(255,255,255,0.04);
      color: #94a3b8;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .slot-btn {
      width: 100%;
      min-height: 52px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      color: #cbd5e1;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .slot-btn.active {
      background: linear-gradient(180deg, #00d4ff 0%, #0ea5e9 100%);
      color: #fff;
      box-shadow: 0 10px 20px rgba(14, 165, 233, 0.24);
      border-color: rgba(0, 212, 255, 0.4);
    }

    .bottom-actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    .save-message {
      min-height: 22px;
      margin-top: 12px;
      color: #94a3b8;
      font-size: 13px;
    }

    .save-message.error {
      color: #f87171;
    }

    @media (max-width: 760px) {
      .time-grid {
        grid-template-columns: 76px repeat(5, 1fr);
        gap: 6px;
      }

      .cell,
      .slot-btn {
        min-height: 46px;
        font-size: 12px;
      }

      .availability-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="availability-page">
    <div class="availability-shell">
      <section class="availability-card">
        <div class="availability-top">
          <div>
            <h1 class="availability-title">시간 등록</h1>
            <p class="availability-desc">캐릭터별 참여 가능한 요일과 시간을 선택해주세요</p>
          </div>
          <button class="btn btn-secondary" id="backButton">뒤로가기</button>
        </div>

        <select id="characterSelect" class="character-select"></select>
      </section>

      <section class="availability-card">
        <h2 class="grid-title">가능 시간 선택</h2>
        <div class="time-grid" id="timeGrid"></div>

        <div class="bottom-actions">
          <button class="btn btn-primary" id="saveButton">저장하기</button>
          <button class="btn btn-secondary" id="resetButton">선택 초기화</button>
        </div>

        <div class="save-message" id="saveMessage"></div>
      </section>
    </div>
  </main>

  <script src="./js/availability.js"></script>
</body>
</html>
