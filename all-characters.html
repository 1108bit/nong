<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#06111d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>전체 캐릭터</title>
  <link rel="stylesheet" href="./css/variables.css?v=20260407133626" />
  <link rel="stylesheet" href="./css/layout.css?v=20260407133626" />
  <link rel="stylesheet" href="./css/components.css?v=20260407133626" />
  <link rel="stylesheet" href="./css/pages.css?v=20260407133626" />
</head>
<body>
  <div class="bg-logo"></div>
  <div class="bg-dim"></div>
  <main class="app-page">
    <div class="main-shell">
      <section class="main-header-hero">
        <div class="main-hero-top">
          <h1 class="main-page-title">전체 캐릭터</h1>
        </div>
      </section>
      <section class="main-grid">
        <article class="main-card" style="grid-column: 1 / -1;">
          <div class="card-head" style="align-items: center;">
            <h2 class="section-title">멤버 현황</h2>
            <label class="checkbox-label" style="margin: 0; cursor: pointer;">
              <input type="checkbox" id="filterMainCharCheck" class="ios-toggle" />
              <span class="checkbox-text" style="font-weight: 700; color: var(--cyan-2);">본캐만 보기</span>
            </label>
          </div>
          <div id="allCharactersTableContainer"></div>
        </article>
      </section>
    </div>
    <button class="floating-back-btn touch-pop" id="backButton">
      <span style="font-size:18px; opacity:0.8;">←</span> 메인으로
    </button>
  </main>
  <script src="./js/api.js?v=20260407133626"></script>
  <script src="./js/common.js?v=20260407133626"></script>
  <script src="./js/all-characters.js?v=20260407133626"></script>
</body>
</html>
