<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoStepBack - 일정 관리</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="bg-logo"></div>
  <div class="bg-dim"></div>
  <main class="app-page">
    <div class="main-shell">
      <section class="main-header-hero">
        <div class="main-hero-top">
          <h1 class="main-page-title">일정 관리</h1>
          <div>
            <button class="btn btn-secondary" id="backButton" style="padding: 0 16px; min-height: 40px; border-radius: 12px; font-size: 13px;">← 메인으로</button>
          </div>
        </div>
      </section>
      <section class="main-grid admin-grid">
        <article class="main-card admin-card-full">
          <div class="card-head"><h2 class="section-title">일정 등록/수정</h2></div>
          <div class="admin-form-grid">
            <div class="form-group" style="grid-column: 1 / -1;">
              <label class="input-label">일자 선택</label>
              <div class="chip-select-group horizontal-scroll-chips" id="dateChipGroup"></div>
              <input type="hidden" id="dateInput" />
              <input type="hidden" id="dayInput" />
            </div>
            <div class="form-group" style="grid-column: 1 / -1;">
              <label class="input-label">시간 선택</label>
              <div style="display: flex; gap: 10px; align-items: center;">
                <input type="text" id="timeSlotInput" class="main-input" value="21:00" maxlength="5" style="width: 100px; flex-shrink: 0; text-align: center; font-weight: 900; font-size: 16px;" />
                <div class="chip-select-group horizontal-scroll-chips" data-target="timeSlotInput" style="margin-top: 0;">
                  <button type="button" class="chip-btn" data-value="20:00">20:00</button>
                  <button type="button" class="chip-btn selected" data-value="21:00">21:00</button>
                  <button type="button" class="chip-btn" data-value="21:30">21:30</button>
                  <button type="button" class="chip-btn" data-value="22:00">22:00</button>
                  <button type="button" class="chip-btn" data-value="23:00">23:00</button>
                </div>
              </div>
            </div>
            <div class="form-group" style="grid-column: 1 / -1;"><label class="input-label">메모</label><input type="text" id="noteInput" class="main-input" autocomplete="off" /></div>
          </div>
          <div class="admin-action-row" style="justify-content: center; margin-top: 16px;">
            <button class="btn btn-primary" id="saveButton" style="width: 100%; max-width: 320px;">일정 저장</button>
          </div>
          <div class="page-message" id="adminMessage">내용 입력 후 저장 버튼을 눌러주세요.</div>
        </article>

        <article class="main-card admin-card-full">
          <div class="card-head"><h2 class="section-title">등록된 일정 목록</h2></div>
          <div class="admin-list" id="scheduleList"></div>
        </article>

        <article class="main-card admin-card-full">
          <div class="card-head"><h2 class="section-title">유저 캐릭터 관리</h2></div>
          <div class="form-group">
            <label class="input-label">유저 검색 (본캐명)</label>
            <div style="display: flex; gap: 8px; align-items: center;">
              <input type="text" id="userAccountIdInput" class="main-input" placeholder="예: 농[젠카]" autocomplete="off" style="flex: 1; height: 52px;" />
              <button class="btn btn-primary" id="searchUserButton" style="flex-shrink: 0; width: 90px; height: 52px; min-height: 52px; padding: 0;">검색</button>
            </div>
          </div>
          
          <div id="userSearchResultArea" class="user-search-result-box" style="display: none;">
            <div class="user-info-text" id="userMessage"></div>
            <div class="admin-list" id="userCharacterList"></div>
          </div>
        </article>

      <article class="main-card admin-card-full" id="securitySettingsCard">
        <div class="card-head"><h2 class="section-title">시스템 및 보안 설정</h2></div>
        <div class="form-group" style="margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid rgba(138, 188, 233, 0.1);">
          <label class="input-label">데이터베이스 관리</label>
          <button class="btn btn-secondary" id="checkSchemaButton" style="width: auto; padding: 0 24px;">DB 상태 점검</button>
        </div>
        <div style="max-width: 380px;">
          <div class="form-group">
            <label class="input-label">현재 관리자 코드</label>
            <input type="password" id="oldAdminCodeInput" class="main-input" autocomplete="new-password" />
          </div>
          <div class="form-group">
            <label class="input-label">새 관리자 코드</label>
            <input type="password" id="newAdminCodeInput" class="main-input" autocomplete="new-password" />
          </div>
          <div class="admin-action-row" style="margin-top: 20px;">
            <button class="btn btn-primary" id="changeAdminCodeButton" style="width: 100%;">코드 변경</button>
          </div>
        </div>
      </article>
      </section>

      <!-- 유저 캐릭터 편집 모달 -->
      <div class="modal-overlay" id="adminCharacterModal">
        <div class="modal-sheet">
          <div class="modal-head">
            <h3 class="modal-title">유저 캐릭터 편집</h3>
            <button class="modal-close-btn" id="closeAdminModalButton">닫기</button>
          </div>
          <div class="modal-form">
            <input type="hidden" id="adminModalAccountId" />
            <input type="hidden" id="adminModalOriginalName" />
            <div class="form-group">
              <label class="input-label">캐릭터명</label>
              <input type="text" id="adminModalCharacterName" class="main-input" placeholder="캐릭터명 입력" />
            </div>
            <div class="form-group">
              <label class="input-label">클래스</label>
              <div class="chip-select-group" data-target="adminModalCharacterClass">
                <button type="button" class="chip-btn chip-class 검성" data-value="검성">검성</button>
                <button type="button" class="chip-btn chip-class 수호성" data-value="수호성">수호성</button>
                <button type="button" class="chip-btn chip-class 살성" data-value="살성">살성</button>
                <button type="button" class="chip-btn chip-class 궁성" data-value="궁성">궁성</button>
                <button type="button" class="chip-btn chip-class 마도성" data-value="마도성">마도성</button>
                <button type="button" class="chip-btn chip-class 정령성" data-value="정령성">정령성</button>
                <button type="button" class="chip-btn chip-class 치유성" data-value="치유성">치유성</button>
                <button type="button" class="chip-btn chip-class 호법성" data-value="호법성">호법성</button>
              </div>
              <input type="hidden" id="adminModalCharacterClass" />
            </div>
            
            <div class="form-group">
              <label class="input-label">타입</label>
              <div class="chip-select-group" data-target="adminModalCharacterType">
                <button type="button" class="chip-btn chip-type main" data-value="본캐">본캐</button>
                <button type="button" class="chip-btn chip-type sub" data-value="부캐">부캐</button>
              </div>
              <input type="hidden" id="adminModalCharacterType" />
            </div>
            <div class="form-group">
              <label class="input-label">전투력</label>
              <div class="chip-select-group" data-target="adminModalCharacterPower">
                <button type="button" class="chip-btn" data-value="0">100<span class="unit-k">K</span> 미만</button>
                <button type="button" class="chip-btn" data-value="100">100<span class="unit-k">K</span> ~ 150<span class="unit-k">K</span></button>
                <button type="button" class="chip-btn" data-value="150">150<span class="unit-k">K</span> ~ 200<span class="unit-k">K</span></button>
                <button type="button" class="chip-btn" data-value="200">200<span class="unit-k">K</span> ~ 250<span class="unit-k">K</span></button>
                <button type="button" class="chip-btn" data-value="250">250<span class="unit-k">K</span> ~ 300<span class="unit-k">K</span></button>
                <button type="button" class="chip-btn" data-value="300">300<span class="unit-k">K</span> ~ 350<span class="unit-k">K</span></button>
                <button type="button" class="chip-btn" data-value="350">350<span class="unit-k">K</span> ~ 400<span class="unit-k">K</span></button>
                <button type="button" class="chip-btn" data-value="400">400<span class="unit-k">K</span> ~ 450<span class="unit-k">K</span></button>
                <button type="button" class="chip-btn" data-value="450">450<span class="unit-k">K</span> ~ 500<span class="unit-k">K</span></button>
                <button type="button" class="chip-btn" data-value="500">500<span class="unit-k">K</span> 이상</button>
              </div>
              <input type="hidden" id="adminModalCharacterPower" />
            </div>
            
            <div class="modal-action-row">
              <button class="btn btn-secondary" id="cancelAdminModalButton">취소</button>
              <button class="btn btn-primary" id="submitAdminCharacterButton">수정하기</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 일정 편집 모달 -->
      <div class="modal-overlay" id="scheduleModal">
        <div class="modal-sheet">
          <div class="modal-head">
            <h3 class="modal-title">일정 수정</h3>
            <button class="modal-close-btn" id="closeScheduleModalBtn">닫기</button>
          </div>
          <div class="modal-form">
            <input type="hidden" id="editOriginalDate" />
            <input type="hidden" id="editOriginalDay" />
            <input type="hidden" id="editOriginalTime" />
            
            <div class="form-group">
              <label class="input-label">일자 변경</label>
              <div class="chip-select-group horizontal-scroll-chips" id="editDateChipGroup"></div>
              <input type="hidden" id="editDateInput" />
              <input type="hidden" id="editDayInput" />
            </div>
            <div class="form-group">
              <label class="input-label">시간 변경</label>
              <div style="display: flex; gap: 10px; align-items: center;">
                <input type="text" id="editTimeSlotInput" class="main-input" maxlength="5" style="width: 100px; flex-shrink: 0; text-align: center; font-weight: 900; font-size: 16px;" />
                <div class="chip-select-group horizontal-scroll-chips" data-target="editTimeSlotInput" style="margin-top: 0;">
                  <button type="button" class="chip-btn" data-value="20:00">20:00</button>
                  <button type="button" class="chip-btn" data-value="21:00">21:00</button>
                  <button type="button" class="chip-btn" data-value="21:30">21:30</button>
                  <button type="button" class="chip-btn" data-value="22:00">22:00</button>
                  <button type="button" class="chip-btn" data-value="23:00">23:00</button>
                </div>
              </div>
            </div>
            <div class="form-group">
              <label class="input-label">메모 변경</label>
              <input type="text" id="editNoteInput" class="main-input" autocomplete="off" />
            </div>
            <div class="admin-action-row" style="margin-top: 20px;">
              <button class="btn btn-secondary" id="cancelScheduleModalBtn">취소</button>
              <button class="btn btn-primary" id="submitScheduleModalBtn">수정 완료하기</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="./js/common.js?v=4"></script>
  <script src="./js/admin.js?v=4"></script>
</body>
</html>
