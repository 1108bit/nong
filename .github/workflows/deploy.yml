name: GAS_Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install clasp
        run: npm install -g @google/clasp
      - name: Create clasprc
        run: echo "${{ secrets.CLASPRC_JSON }}" > ~/.clasprc.json
      - name: Push and Deploy
        run: |
          clasp push --force
          clasp deploy -i AKfycbxgoannrkzyrAaIF8FeJP-ZJyFUrhdtT1d_iJdrY0JiJwqebPYbToS5r-nUYp6Ow-2fYw -d "Auto Update"