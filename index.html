<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoStepBack</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="app-page">
    <div class="bg-logo" aria-hidden="true"></div>
    <div class="bg-dim" aria-hidden="true"></div>

    <section class="login-shell">
      <!-- 상단 -->
      <div class="login-brand">
        <div class="brand-badge" id="eyebrowText">AION2</div>
        <h1 class="brand-title" id="siteTitle">NoStepBack</h1>
        <p class="brand-sub" id="noticeText">레이드는 함께해야 재미있지요 :)</p>
      </div>

      <!-- 로그인 -->
      <article class="login-card">
        <div class="login-head">
          <h2 class="login-title" id="loginTitle">입장</h2>
          <p class="login-desc" id="loginDesc">본캐명만 입력하면 바로 들어갈 수 있습니다</p>
        </div>

        <div class="form-group">
          <label class="input-label" for="mainName" id="mainNameLabel">본캐명</label>
          <input
            class="main-input"
            type="text"
            id="mainName"
            placeholder="캐릭터명을 입력해주세요"
            autocomplete="off"
            maxlength="30"
          />
        </div>

        <button class="main-button" id="loginButton">입장하기</button>
        <div class="result" id="loginResult"></div>
      </article>

      <!-- 하단 -->
      <p class="copyright-text" id="footerNote">
        © 농[젠카]. All Rights Reserved.
      </p>
    </section>
  </main>

  <script src="./js/app.js"></script>
</body>
</html>
