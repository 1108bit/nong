name: Deploy to Google Apps Script

# 언제 실행할지 설정 (main 브랜치에 push가 일어날 때마다)
on:
  push:
    branches:
      - main  # 만약 내 브랜치 이름이 master라면 master로 수정해 주세요!

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. GitHub 서버로 내 소스 코드 가져오기
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Node.js 환경 준비
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3. 구글 clasp 도구 설치
      - name: Install clasp
        run: npm install -g @google/clasp

      # 4. GitHub Secrets에 저장한 '열쇠(CLASPRC_JSON)'를 파일로 만들기
      - name: Create clasprc.json
        run: |
          echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      # 5. 구글 서버로 코드 업로드 및 라이브 사이트 강제 업데이트
      - name: Deploy to App Script
        run: |
          clasp push --force
          clasp version "Auto Update via GitHub Actions"
          clasp deploy -i AKfycbyTEOXemEy0q67fjn2yqxnNlxobfCD9yIf0hcrbF6jvy3q1YSevu5T8kGDiTX7qX9bWpw