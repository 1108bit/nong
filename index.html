<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoStepBack - 로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="bg-logo"></div>
  <div class="bg-dim"></div>
  <main class="page">
    <div class="login-shell">
      <section class="login-brand">
        <div class="brand-badge">AION2</div>
        <h1 class="brand-title">NoStepBack</h1>
        <p class="brand-sub">레이드 일정과 파티를 스마트하게 관리하세요.</p>
      </section>
      <section class="login-card">
        <div class="login-head">
          <h2 class="login-title">길드 입장</h2>
          <p class="login-desc">본캐명으로 간편하게 길드에 합류하세요.</p>
        </div>
        <div class="form-group">
          <label class="input-label" for="mainName">본캐명</label>
          <input type="text" id="mainName" class="main-input" placeholder="정확한 닉네임을 입력하세요" autocomplete="off" />
        </div>
        <div class="form-group">
          <label class="input-label" for="password">비밀번호</label>
          <input type="password" id="password" class="main-input" placeholder="숫자 4자리" maxlength="4" autocomplete="off" />
        </div>
        <button type="button" class="main-button" id="loginButton">입장하기</button>
        <div class="page-message" id="loginResult">본캐명을 입력해주세요.</div>
      </section>
      <p class="copyright-text" id="adminSecretBtn" style="cursor: pointer; user-select: none; -webkit-user-select: none;">© 농[젠카]. All Rights Reserved.</p>
    </div>
  </main>
  <script src="./js/common.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
