<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#06111d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>그림자 레기온 - 메인</title>
  <link rel="stylesheet" href="./css/variables.css?v=20260407131023" />
  <link rel="stylesheet" href="./css/layout.css?v=20260407131023" />
  <link rel="stylesheet" href="./css/components.css?v=20260407131023" />
  <link rel="stylesheet" href="./css/pages.css?v=20260407131023" />
</head>
<body>
  <div class="bg-logo"></div>
  <div class="bg-dim"></div>
  <main class="app-page">
    <div class="main-shell">
      <section class="main-header-hero">
        <div class="main-hero-bg"></div>
        <div class="main-hero-top">
          <div>
            <div class="main-eyebrow">AION2</div>
            <h1 class="main-page-title">그림자 · SHADOW</h1>
            <p class="main-page-desc">레기온 일정과 캐릭터를 관리합니다.</p>
          </div>
        </div>
        
        <!-- 공지사항 영역 -->
        <div id="noticeContainer" class="notice-container" style="display: none;">
          <div class="notice-head">
            <span class="notice-badge">📢 레기온 공지</span>
            <button id="editNoticeBtn" class="icon-btn edit-btn" style="display: none; width: 24px; height: 24px; min-height: 24px; font-size: 12px;" title="공지 수정">✏️</button>
          </div>
          <div id="noticeText" class="notice-text"></div>
        </div>

        <!-- 헤더로 통합된 내 정보 바 -->
        <div class="hero-info-bar">
          <div class="hero-info-item">
            <span class="hero-info-label">본캐명</span>
            <strong class="hero-info-value" id="accountMainName" style="color: var(--text-main);">-</strong>
          </div>
          <div class="hero-info-divider"></div>
          <div class="hero-info-item">
            <span class="hero-info-label">캐릭터</span>
            <strong class="hero-info-value" id="characterCount">0</strong>
          </div>
          <div class="hero-info-divider"></div>
          <div class="hero-info-item">
            <span class="hero-info-label">선택 시간</span>
            <strong class="hero-info-value" id="selectedCount">0개</strong>
          </div>
        </div>
      </section>

      <section class="main-grid">
        <article class="main-card" style="grid-column: 1 / -1;">
          <div class="card-head">
            <h2 class="section-title">내 캐릭터</h2>
            <button type="button" class="mini-btn" id="addCharacterButton">추가</button>
          </div>
          <div class="character-list" id="characterList">
            <div class="character-empty">불러오는 중...</div>
          </div>
        </article>

        <article class="main-card" style="grid-column: 1 / -1; margin-top: 14px;">
          <div class="card-head">
            <h2 class="section-title">내 레이드 일정</h2>
            <button type="button" class="mini-btn" onclick="movePage('availability.html')">신청/수정</button>
          </div>
          <div class="character-list" id="myScheduleList">
            <div class="character-empty">불러오는 중...</div>
          </div>
        </article>
      </section>

      <!-- 관리자 진입용 숨겨진 버튼 (이스터에그) -->
      <div class="copyright-text" id="adminSecretBtn" style="text-align: center; margin-top: 32px; margin-bottom: 20px; cursor: pointer; user-select: none; -webkit-user-select: none;">© 농[젠카]. All Rights Reserved.</div>
    </div>

    <div class="bottom-action-bar">
      <button class="bottom-action-btn primary" onclick="movePage('availability.html')">
        <span class="action-icon">📅</span>
        <span class="action-text">레이드 신청</span>
      </button>
      <button class="bottom-action-btn purple" onclick="movePage('all-characters.html')">
        <span class="action-icon">👥</span>
        <span class="action-text">레기온 멤버</span>
      </button>
      <button class="bottom-action-btn accent" id="bottomAddBtn">
        <span class="action-icon">➕</span>
        <span class="action-text">캐릭터 추가</span>
      </button>
      <button class="bottom-action-btn gray" id="openSettingsBtn">
        <span class="action-icon">⚙️</span>
        <span class="action-text">설정</span>
      </button>
    </div>

    <div class="modal-overlay" id="characterModal">
      <div class="modal-sheet">
        <div class="modal-head">
          <h3 class="modal-title" id="modalTitle">캐릭터 추가</h3>
          <button class="modal-close-btn" id="closeCharacterModalButton">닫기</button>
        </div>
        <div class="modal-form">
          <div class="form-group">
            <label class="input-label">캐릭터명</label>
            <input type="text" id="modalCharacterName" class="main-input" placeholder="캐릭터명 입력" />
          </div>
          <div class="form-group">
            <label class="input-label">클래스</label>
            <div class="chip-select-group" data-target="modalCharacterClass">
              <button type="button" class="chip-btn chip-class 검성 selected" data-value="검성">검성</button>
              <button type="button" class="chip-btn chip-class 수호성" data-value="수호성">수호성</button>
              <button type="button" class="chip-btn chip-class 살성" data-value="살성">살성</button>
              <button type="button" class="chip-btn chip-class 궁성" data-value="궁성">궁성</button>
              <button type="button" class="chip-btn chip-class 마도성" data-value="마도성">마도성</button>
              <button type="button" class="chip-btn chip-class 정령성" data-value="정령성">정령성</button>
              <button type="button" class="chip-btn chip-class 치유성" data-value="치유성">치유성</button>
              <button type="button" class="chip-btn chip-class 호법성" data-value="호법성">호법성</button>
            </div>
            <input type="hidden" id="modalCharacterClass" value="검성" />
          </div>
          
          <div class="form-group">
            <label class="input-label">타입</label>
            <div class="chip-select-group" data-target="modalCharacterType">
              <button type="button" class="chip-btn chip-type main" data-value="본캐" id="chipTypeMain">본캐</button>
              <button type="button" class="chip-btn chip-type sub selected" data-value="부캐" id="chipTypeSub">부캐</button>
            </div>
            <input type="hidden" id="modalCharacterType" value="부캐" />
          </div>
          <div class="form-group">
            <label class="input-label">전투력</label>
            <div class="chip-select-group" data-target="modalCharacterPower">
              <button type="button" class="chip-btn" data-value="0">100<span class="unit-k">K</span> 미만</button>
              <button type="button" class="chip-btn" data-value="100">100<span class="unit-k">K</span> ~ 150<span class="unit-k">K</span></button>
              <button type="button" class="chip-btn" data-value="150">150<span class="unit-k">K</span> ~ 200<span class="unit-k">K</span></button>
              <button type="button" class="chip-btn" data-value="200">200<span class="unit-k">K</span> ~ 250<span class="unit-k">K</span></button>
              <button type="button" class="chip-btn" data-value="250">250<span class="unit-k">K</span> ~ 300<span class="unit-k">K</span></button>
              <button type="button" class="chip-btn" data-value="300">300<span class="unit-k">K</span> ~ 350<span class="unit-k">K</span></button>
              <button type="button" class="chip-btn" data-value="350">350<span class="unit-k">K</span> ~ 400<span class="unit-k">K</span></button>
              <button type="button" class="chip-btn selected" data-value="400">400<span class="unit-k">K</span> ~ 450<span class="unit-k">K</span></button>
              <button type="button" class="chip-btn" data-value="450">450<span class="unit-k">K</span> ~ 500<span class="unit-k">K</span></button>
              <button type="button" class="chip-btn" data-value="500">500<span class="unit-k">K</span> 이상</button>
            </div>
            <input type="hidden" id="modalCharacterPower" value="400" />
          </div>
          
          <div class="modal-action-row">
            <button class="btn btn-secondary" id="cancelCharacterButton">취소</button>
            <button class="btn btn-primary" id="submitCharacterButton">등록하기</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 심플 액션 Action Sheet (더보기) -->
    <div class="action-sheet-overlay" id="characterActionSheet" onclick="if(event.target===this) closeCharacterActionSheet()">
      <div class="action-sheet">
        <div class="action-sheet-group">
          <div class="action-sheet-head">
            <span id="actionSheetCharName" style="font-weight: 800; font-size: 13px; color: var(--text-sub);">캐릭터명</span>
          </div>
          <button class="action-sheet-btn" onclick="closeCharacterActionSheet(); openEditModal(selectedCharNameForAction)">✏️ 편집</button>
          <button class="action-sheet-btn" id="actionSheetToggleBtn" onclick="closeCharacterActionSheet(); toggleCharacterType(selectedCharNameForAction)">⇄ 본캐/부캐 전환</button>
          <button class="action-sheet-btn danger" id="actionSheetDeleteBtn" onclick="closeCharacterActionSheet(); confirmDelete(selectedCharNameForAction)">🗑️ 삭제</button>
        </div>
        <div class="action-sheet-gap"></div>
        <button class="action-sheet-btn cancel" onclick="closeCharacterActionSheet()">취소</button>
      </div>
    </div>

    <!-- 심플 액션 설정 메뉴 Action Sheet -->
    <div class="action-sheet-overlay" id="settingsActionSheet" onclick="if(event.target===this) closeSettingsActionSheet()">
      <div class="action-sheet">
        <div class="action-sheet-group">
          <div class="action-sheet-head">
            <span style="font-weight: 800; font-size: 13px; color: var(--text-sub);">시스템 및 계정 설정</span>
          </div>
          <button class="action-sheet-btn" id="changePwdBtn">🔑 비밀번호 변경</button>
          <button class="action-sheet-btn" id="goAdminBtn" style="display: none; color: var(--gold-1);">👑 관리자 페이지</button>
          <button class="action-sheet-btn danger" id="logoutBtn">🚪 로그아웃</button>
        </div>
        <div class="action-sheet-gap"></div>
        <button class="action-sheet-btn cancel" onclick="closeSettingsActionSheet()">닫기</button>
      </div>
    </div>
  </main>
  <script src="./js/api.js?v=20260407131023"></script>
  <script src="./js/common.js?v=20260407131023"></script>
  <script src="./js/main.js?v=20260407131023"></script>
</body>
</html>
