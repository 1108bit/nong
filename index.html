<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>노스텝백</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="app-page">
    <div class="bg-logo" aria-hidden="true"></div>
    <div class="bg-dim" aria-hidden="true"></div>

    <section class="login-shell">
<div class="login-brand">
  <div class="brand-badge" id="eyebrowText">AION2</div>
  <h1 class="brand-title" id="siteTitle">NoStepBack</h1>
  <p class="brand-sub" id="noticeText">레이드 플래너</p>
</div>

      <article class="login-card">
        <div class="login-head">
          <h2 class="login-title" id="loginTitle">LOG IN</h2>
          <p class="login-desc" id="loginDesc"> </p>
        </div>

        <div class="form-group">
          <label class="input-label" for="mainName" id="mainNameLabel">본캐명</label>
          <input
            class="main-input"
            type="text"
            id="mainName"
            placeholder="캐릭터명을 입력해주세요"
            autocomplete="off"
          />
        </div>

        <button class="main-button" id="loginButton">입장하기</button>
        <div class="result" id="loginResult"></div>
      </article>

<p class="copyright-text" id="footerNote">AION2 © 농[젠카]. All Rights Reserved.</p>
    </section>
  </main>

  <script src="./js/app.js"></script>
</body>
</html>
