<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NSB Legion Main</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="page">
    <section class="main-shell">
      <header class="main-header">
        <div>
          <div class="main-eyebrow">NSB LEGION</div>
          <h1 class="main-page-title">레기온 메인</h1>
          <p class="main-page-desc">내 캐릭터와 이번 주 참여 현황을 확인할 수 있어요.</p>
        </div>
        <button class="btn btn-secondary header-btn" id="logoutButton">로그아웃</button>
      </header>

      <section class="main-grid">
        <article class="panel main-card">
          <h2 class="section-title">내 정보</h2>
          <div class="info-list">
            <div class="info-row">
              <span class="info-label">본캐명</span>
              <span class="info-value" id="accountMainName">철규</span>
            </div>
            <div class="info-row">
              <span class="info-label">총 캐릭터 수</span>
              <span class="info-value" id="characterCount">3</span>
            </div>
            <div class="info-row">
              <span class="info-label">이번 주 참여</span>
              <span class="info-value" id="weeklyRunCount">1 / 2</span>
            </div>
          </div>
        </article>

        <article class="panel main-card">
          <div class="card-head">
            <h2 class="section-title">내 캐릭터</h2>
            <button class="mini-btn" id="addCharacterButton">캐릭터 추가</button>
          </div>

          <div class="character-list" id="characterList">
            <div class="character-item">
              <div>
                <div class="character-name">철규수호성</div>
                <div class="character-meta">수호성 · 18만 · 본캐</div>
              </div>
              <div class="character-badge">사용중</div>
            </div>

            <div class="character-item">
              <div>
                <div class="character-name">철규치유성</div>
                <div class="character-meta">치유성 · 16만 · 부캐</div>
              </div>
              <div class="character-badge">사용중</div>
            </div>

            <div class="character-item">
              <div>
                <div class="character-name">철규살성</div>
                <div class="character-meta">살성 · 14만 · 부캐</div>
              </div>
              <div class="character-badge off">대기</div>
            </div>
          </div>
        </article>

        <article class="panel main-card">
          <h2 class="section-title">이번 주 참여 현황</h2>

          <div class="history-list" id="historyList">
            <div class="history-item">
              <div>
                <div class="history-time">수요일 21:00</div>
                <div class="history-desc">철규수호성 / 1파티</div>
              </div>
              <div class="history-state done">참여완료</div>
            </div>

            <div class="history-item">
              <div>
                <div class="history-time">목요일 22:00</div>
                <div class="history-desc">배정 없음</div>
              </div>
              <div class="history-state wait">미정</div>
            </div>

            <div class="history-item">
              <div>
                <div class="history-time">토요일 21:00</div>
                <div class="history-desc">철규치유성 / 2파티</div>
              </div>
              <div class="history-state plan">예정</div>
            </div>
          </div>
        </article>

        <article class="panel main-card">
          <h2 class="section-title">빠른 메뉴</h2>

          <div class="quick-menu">
            <button class="btn btn-primary" id="goAvailabilityButton">시간 등록</button>
            <button class="btn btn-secondary" id="goPartyButton">파티 보기</button>
            <button class="btn btn-secondary" id="goHistoryButton">내 기록 보기</button>
          </div>
        </article>
      </section>
    </section>
  </main>

  <script src="./js/main.js"></script>
</body>
</html>
