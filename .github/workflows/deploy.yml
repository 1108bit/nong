- name: Deploy to App Script & Update Live Site
        run: |
          # 1. 코드를 구글 서버로 전송
          clasp push --force
          
          # 2. 지정된 배포 ID로 즉시 라이브 업데이트 (버전 자동 생성)
          # 배포 ID: AKfycbxgoannrkzyrAaIF8FeJP-ZJyFUrhdtT1d_iJdrY0JiJwqebPYbToS5r-nUYp6Ow-2fYw
          clasp deploy -i AKfycbxgoannrkzyrAaIF8FeJP-ZJyFUrhdtT1d_iJdrY0JiJwqebPYbToS5r-nUYp6Ow-2fYw -d "Release v100+ Auto Update"

      - name: 배포 실패 알림
        if: failure()
        run: echo "🚨 배포에 실패했습니다! VS Code에서 로그를 확인하거나 clasp login 상태를 점검하세요."