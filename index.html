<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#06111d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>LEGION MANAGER - 로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/variables.css?v=20260407135139" />
  <link rel="stylesheet" href="./css/layout.css?v=20260407135139" />
  <link rel="stylesheet" href="./css/components.css?v=20260407135139" />
  <link rel="stylesheet" href="./css/pages.css?v=20260407135139" />
</head>
<body>
  <!-- 스플래시 스크린 (인트로) -->
  <div id="splashScreen" class="splash-screen">
    <div class="splash-logo-wrap">
      <img src="./images/logo_main1.png" alt="Legion Mark" class="splash-logo" />
      <div class="splash-greeting">어서오세요, 그림자입니다.</div>
    </div>
  </div>

  <div class="bg-logo"></div>
  <div class="bg-dim"></div>
  <main class="page">
    <div class="login-shell">
      <section class="login-brand">
        <div class="brand-badge">AION2 · 그림자 레기온</div>
        <h1 class="brand-title">LEGION MANAGER</h1>
        <p class="brand-sub">레이드 일정과 파티를 스마트하게 관리하세요.</p>
      </section>
      <section class="login-card">
        <div class="form-group">
          <label class="input-label" for="mainName">본캐명</label>
          <input type="text" id="mainName" class="main-input" placeholder="정확한 닉네임을 입력하세요" autocomplete="off" />
        </div>
        <div class="form-group">
          <label class="input-label" for="password">비밀번호</label>
          <!-- 💡 [UX 향상] 아이폰/안드로이드에서 터치 시 즉시 커다란 숫자 키패드가 올라오도록 호환성 추가 -->
          <input type="password" id="password" class="main-input" placeholder="숫자 4자리" maxlength="4" autocomplete="off" inputmode="numeric" pattern="[0-9]*" />
        </div>
        <div class="login-options-row">
          <label class="checkbox-label">
            <input type="checkbox" id="autoLoginCheck" class="ios-toggle" checked />
            <span class="checkbox-text">자동 로그인</span>
          </label>
          <span id="forgotPasswordBtn" class="forgot-link">비밀번호를 잊으셨나요?</span>
        </div>
        <button type="button" class="main-button" id="loginButton">로그인</button>
        <div class="page-message" id="loginResult">본캐명을 입력해주세요.</div>
      </section>
      <p class="copyright-text" id="adminSecretBtn" style="cursor: pointer; user-select: none; -webkit-user-select: none;">© 농[젠카]. All Rights Reserved.</p>
    </div>

  </main>
  <script src="./js/api.js?v=20260407135139"></script>
  <script src="./js/common.js?v=20260407135139"></script>
  <script src="./js/app.js?v=20260407135139"></script>
</body>
</html>
