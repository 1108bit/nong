<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoStepBack - 관리자 인증</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="bg-logo"></div>
  <div class="bg-dim"></div>
  <main class="app-page">
    <div class="main-shell">
      <section class="main-header-hero">
        <div class="main-hero-top">
          <div>
            <div class="main-eyebrow">AION2 · ADMIN</div>
            <h1 class="main-page-title">관리자 확인</h1>
          </div>
          <button type="button" class="btn btn-secondary" id="backButton">메인으로</button>
        </div>
      </section>
      <section class="main-grid">
        <article class="main-card">
          <div class="form-group">
            <label class="input-label" for="adminCode">관리자 코드</label>
            <input type="password" id="adminCode" class="main-input" placeholder="코드를 입력하세요" />
          </div>
          <button type="button" class="main-button" id="loginButton">인증하기</button>
          <div class="page-message" id="loginMessage">운영진 전용 화면입니다.</div>
        </article>
      </section>
    </div>
  </main>
  <script src="./js/common.js"></script>
  <script src="./js/admin-login.js"></script>
</body>
</html>
