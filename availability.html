<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>그림자 레기온 - 시간 선택</title>
  <link rel="stylesheet" href="./css/style.css?v=6" />
</head>
<body>
  <div class="bg-logo"></div>
  <div class="bg-dim"></div>
  <main class="app-page">
    <div class="main-shell">
      <section class="main-header-hero">
        <div class="main-hero-top">
          <h1 class="main-page-title">시간 선택</h1>
          <button class="btn btn-secondary" id="backButton">메인으로</button>
        </div>
      </section>
      <section class="main-grid">
        <article class="main-card availability-card-full">
          <div class="card-head"><h2 class="section-title">날짜 선택</h2></div>
          <div class="horizontal-scroll-chips chip-select-group" id="dateChipGroup" style="margin-bottom: 12px;"></div>
          <div class="scroll-indicator" style="margin-bottom: 24px;"><div class="scroll-indicator-dot" id="dateScrollInd"></div></div>

          <div class="card-head"><h2 class="section-title">일정 선택</h2></div>
          <div class="page-message" id="pageMessage">참여 가능한 시간을 선택하세요. (자동 저장)</div>
          <div class="availability-list" id="availabilityList">
            <div class="availability-empty">일정을 불러오는 중...</div>
          </div>
        </article>
      </section>
    </div>
  </main>
  <script src="./js/api.js?v=6"></script>
  <script src="./js/common.js?v=6"></script>
  <script src="./js/availability.js?v=6"></script>
</body>
</html>
