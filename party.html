<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>그림자 레기온 - 조합 보기</title>
  <link rel="stylesheet" href="./css/variables.css?v=20260406203425" />
  <link rel="stylesheet" href="./css/layout.css?v=20260406203425" />
  <link rel="stylesheet" href="./css/components.css?v=20260406203425" />
  <link rel="stylesheet" href="./css/pages.css?v=20260406203425" />
</head>
<body>
  <div class="bg-logo"></div>
  <div class="bg-dim"></div>
  <main class="app-page">
    <div class="main-shell">
      <section class="main-header-hero">
        <div class="main-hero-top">
          <h1 class="main-page-title">조합 보기</h1>
          <button class="btn btn-secondary" id="backButton">메인으로</button>
        </div>
      </section>
      <section class="main-grid party-grid">
        <article class="main-card party-card-full">
          <div class="card-head"><h2 class="section-title">시간대 선택</h2></div>
          <div class="party-summary-list" id="summaryGrid">
            <div class="availability-empty">집계 데이터를 불러오는 중...</div>
          </div>
        </article>
        <article class="main-card">
          <div class="card-head"><h2 class="section-title">1파티</h2><div id="party1Badges"></div></div>
          <div class="party-member-list" id="party1List"></div>
        </article>
        <article class="main-card">
          <div class="card-head"><h2 class="section-title">2파티</h2><div id="party2Badges"></div></div>
          <div class="party-member-list" id="party2List"></div>
        </article>
      </section>
    </div>
  </main>
  <script src="./js/api.js?v=20260406203425"></script>
  <script src="./js/common.js?v=20260406203425"></script>
