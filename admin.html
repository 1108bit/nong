<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoStepBack - 일정 관리</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="bg-logo"></div>
  <div class="bg-dim"></div>
  <main class="app-page">
    <div class="main-shell">
      <section class="main-header-hero">
        <div class="main-hero-top">
          <h1 class="main-page-title">일정 관리</h1>
          <div>
            <button class="btn btn-primary" id="checkSchemaButton">DB 상태 점검</button>
            <button class="btn btn-secondary" id="backButton">메인으로</button>
          </div>
        </div>
      </section>
      <section class="main-grid admin-grid">
        <article class="main-card admin-card-full">
          <div class="card-head"><h2 class="section-title">일정 등록/수정</h2></div>
          <div class="admin-form-grid">
            <div class="form-group"><label class="input-label">날짜</label><input type="date" id="dateInput" class="main-input" /></div>
            <div class="form-group">
              <label class="input-label">요일</label>
              <select id="dayInput" class="character-select">
                <option value="수">수</option><option value="목">목</option><option value="금">금</option>
                <option value="토">토</option><option value="일">일</option><option value="월">월</option><option value="화">화</option>
              </select>
            </div>
            <div class="form-group"><label class="input-label">시간</label><input type="text" id="timeSlotInput" class="main-input" placeholder="예: 21:00" /></div>
            <div class="form-group"><label class="input-label">메모</label><input type="text" id="noteInput" class="main-input" placeholder="예: 본캐 위주" /></div>
          </div>
          <div class="admin-action-row">
            <button class="btn btn-primary" id="saveButton">일정 저장</button>
            <button class="btn btn-secondary" id="refreshButton">새로고침</button>
          </div>
          <div class="page-message" id="adminMessage">내용 입력 후 저장 버튼을 눌러주세요.</div>
        </article>

        <article class="main-card admin-card-full">
          <div class="card-head"><h2 class="section-title">유저 캐릭터 관리</h2></div>
          <div class="form-group">
            <label class="input-label">유저 계정 ID</label>
            <input type="text" id="userAccountIdInput" class="main-input" placeholder="예: user123" />
          </div>
          <div class="admin-action-row">
            <button class="btn btn-primary" id="searchUserButton">유저 검색</button>
          </div>
          <div class="page-message" id="userMessage">계정 ID를 입력하고 검색하세요.</div>
          <div class="admin-list" id="userCharacterList"></div>
        </article>

        <article class="main-card admin-card-full">
          <div class="card-head"><h2 class="section-title">등록된 일정 목록</h2></div>
          <div class="admin-list" id="scheduleList"></div>
        </article>

      <article class="main-card admin-card-full">
        <div class="card-head"><h2 class="section-title">보안 설정</h2></div>
        <div class="form-group">
          <label class="input-label">현재 관리자 코드</label>
          <input type="password" id="oldAdminCodeInput" class="main-input" placeholder="현재 코드를 입력하세요" />
        </div>
        <div class="form-group">
          <label class="input-label">새 관리자 코드</label>
          <input type="text" id="newAdminCodeInput" class="main-input" placeholder="변경할 코드를 입력하세요" />
        </div>
        <div class="admin-action-row">
          <button class="btn btn-primary" id="changeAdminCodeButton">코드 변경</button>
        </div>
      </article>
      </section>

      <!-- 유저 캐릭터 편집 모달 -->
      <div class="modal-overlay" id="adminCharacterModal">
        <div class="modal-sheet">
          <div class="modal-head">
            <h3 class="modal-title">유저 캐릭터 편집</h3>
            <button class="modal-close-btn" id="closeAdminModalButton">닫기</button>
          </div>
          <div class="modal-form">
            <input type="hidden" id="adminModalAccountId" />
            <input type="hidden" id="adminModalOriginalName" />
            <div class="form-group">
              <label class="input-label">캐릭터명</label>
              <input type="text" id="adminModalCharacterName" class="main-input" placeholder="캐릭터명 입력" />
            </div>
            <div class="form-group">
              <label class="input-label">클래스</label>
              <select id="adminModalCharacterClass" class="character-select">
                <option value="검성">검성</option><option value="수호성">수호성</option>
                <option value="살성">살성</option><option value="궁성">궁성</option>
                <option value="마도성">마도성</option><option value="정령성">정령성</option>
                <option value="치유성">치유성</option><option value="호법성">호법성</option>
              </select>
            </div>
            <div class="modal-grid">
              <div class="form-group">
                <label class="input-label">타입</label>
                <select id="adminModalCharacterType" class="character-select"><option value="본캐">본캐</option><option value="부캐">부캐</option></select>
              </div>
              <div class="form-group">
                <label class="input-label">전투력</label>
                <select id="adminModalCharacterPower" class="character-select">
                  <option value="100">100</option><option value="200">200</option>
                  <option value="300">300</option><option value="400">400</option>
                  <option value="500">500</option><option value="600">600</option>
                  <option value="700">700</option><option value="800">800</option>
                  <option value="900">900</option><option value="1000">1000</option>
                </select>
              </div>
            </div>
            <div class="modal-action-row">
              <button class="btn btn-secondary" id="cancelAdminModalButton">취소</button>
              <button class="btn btn-primary" id="submitAdminCharacterButton">수정하기</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="./js/common.js"></script>
  <script src="./js/admin.js"></script>
</body>
</html>
