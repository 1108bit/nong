<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoStepBack - 메인</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="bg-logo"></div>
  <div class="bg-dim"></div>
  <main class="app-page">
    <div class="main-shell">
      <section class="main-header-hero">
        <div class="main-hero-bg"></div>
        <div class="main-hero-top">
          <div>
            <div class="main-eyebrow">AION2 · GUILD MANAGER</div>
            <h1 class="main-page-title">NoStepBack</h1>
            <p class="main-page-desc">길드 일정과 캐릭터를 관리합니다</p>
          </div>
          <button type="button" class="btn btn-secondary" id="logoutButton">로그아웃</button>
        </div>
      </section>

      <section class="main-grid">
        <article class="main-card">
          <div class="card-head"><h2 class="section-title">내 정보</h2></div>
          <div class="info-list">
            <div class="info-row"><span class="info-label">본캐명</span><strong class="info-value" id="accountMainName">-</strong></div>
            <div class="info-row"><span class="info-label">캐릭터 수</span><strong class="info-value" id="characterCount">0</strong></div>
            <div class="info-row"><span class="info-label">선택 시간</span><strong class="info-value" id="selectedCount">0개</strong></div>
          </div>
        </article>

        <article class="main-card">
          <div class="card-head">
            <h2 class="section-title">내 캐릭터</h2>
            <button type="button" class="mini-btn" id="addCharacterButton">추가</button>
          </div>
          <div class="character-list" id="characterList">
            <div class="character-empty">불러오는 중...</div>
          </div>
        </article>

        <article class="main-card">
          <div class="card-head"><h2 class="section-title">빠른 이동</h2></div>
          <div class="quick-menu">
            <button type="button" class="btn btn-primary" id="goAvailabilityButton">시간 선택</button>
            <button type="button" class="btn btn-secondary" id="goPartyButton">조합 보기</button>
          </div>
        </article>
      </section>
    </div>

    <div class="bottom-action-bar">
      <button class="bottom-action-btn primary" onclick="movePage('availability.html')">시간 선택</button>
      <button class="bottom-action-btn" onclick="movePage('party.html')">조합 보기</button>
      <button class="bottom-action-btn accent" id="bottomAddBtn">캐릭터 추가</button>
    </div>

    <div class="modal-overlay" id="characterModal">
      <div class="modal-sheet">
        <div class="modal-head">
          <h3 class="modal-title">캐릭터 추가</h3>
          <button class="modal-close-btn" id="closeCharacterModalButton">닫기</button>
        </div>
        <div class="modal-form">
          <div class="form-group">
            <label class="input-label">캐릭터명</label>
            <input type="text" id="modalCharacterName" class="main-input" placeholder="캐릭터명 입력" />
          </div>
          <div class="form-group">
            <label class="input-label">클래스</label>
            <select id="modalCharacterClass" class="character-select">
              <option value="검성">검성</option><option value="수호성">수호성</option>
              <option value="살성">살성</option><option value="궁성">궁성</option>
              <option value="마도성">마도성</option><option value="정령성">정령성</option>
              <option value="치유성">치유성</option><option value="호법성">호법성</option>
            </select>
          </div>
          <div class="modal-grid">
            <div class="form-group">
              <label class="input-label">타입</label>
              <select id="modalCharacterType" class="character-select"><option value="본캐">본캐</option><option value="부캐" selected>부캐</option></select>
            </div>
            <div class="form-group">
              <label class="input-label">전투력</label>
              <select id="modalCharacterPower" class="character-select">
                <option value="100">100</option>
                <option value="200">200</option>
                <option value="300">300</option>
                <option value="400">400</option>
                <option value="500">500</option>
                <option value="600">600</option>
                <option value="700">700</option>
                <option value="800">800</option>
                <option value="900">900</option>
                <option value="1000">1000</option>
              </select>
            </div>
          </div>
          <div class="modal-action-row">
            <button class="btn btn-secondary" id="cancelCharacterButton">취소</button>
            <button class="btn btn-primary" id="submitCharacterButton">등록하기</button>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="./js/common.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
