<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>노스텝백 메인</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="page">
    <div class="main-shell">
      <header class="main-header">
        <div>
          <div class="main-eyebrow">AION2</div>
          <h1 class="main-page-title" id="mainTitle">레이드 대시보드</h1>
          <p class="main-page-desc" id="mainDesc">이번 주 파티 현황과 캐릭터 상태를 확인하세요</p>
        </div>
        <button class="btn btn-secondary header-btn" id="logoutButton">로그아웃</button>
      </header>

      <section class="main-grid">
        <article class="main-card">
          <h2 class="section-title" id="sectionMyInfo">내 정보</h2>
          <div class="info-list">
            <div class="info-row">
              <span class="info-label">본캐명</span>
              <strong class="info-value" id="accountMainName">-</strong>
            </div>
            <div class="info-row">
              <span class="info-label">등록 캐릭터</span>
              <strong class="info-value" id="characterCount">0</strong>
            </div>
            <div class="info-row">
              <span class="info-label">주간 레이드</span>
              <strong class="info-value" id="weeklyRunCount">0 / 2</strong>
            </div>
          </div>
        </article>

        <article class="main-card">
          <div class="card-head">
            <h2 class="section-title" id="sectionCharacter">캐릭터</h2>
            <button class="mini-btn" id="addCharacterButton">캐릭터 추가</button>
          </div>
          <div class="character-list" id="characterList">
            <div class="character-item">
              <div>
                <div class="character-name">불러오는 중...</div>
                <div class="character-meta">캐릭터 정보를 불러오고 있습니다</div>
              </div>
              <div class="character-badge off">대기</div>
            </div>
          </div>
        </article>

        <article class="main-card">
          <h2 class="section-title" id="sectionHistory">진행 기록</h2>
          <div class="history-list" id="historyList">
            <div class="history-item">
              <div>
                <div class="history-time">아직 기록이 없습니다</div>
                <div class="history-desc">추후 연결 예정입니다</div>
              </div>
              <div class="history-state plan">예정</div>
            </div>
          </div>
        </article>

        <article class="main-card">
          <h2 class="section-title" id="sectionQuickMenu">빠른 메뉴</h2>
          <div class="quick-menu">
            <button class="btn btn-primary" id="goAvailabilityButton">시간 등록</button>
            <button class="btn btn-secondary" id="goPartyButton">파티 보기</button>
            <button class="btn btn-secondary" id="goHistoryButton">내 기록 보기</button>
          </div>
        </article>
      </section>
    </div>
  </main>

  <script src="./js/main.js"></script>
</body>
</html>
