<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoStepBack - 일정 관리</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="bg-logo"></div>
  <div class="bg-dim"></div>

  <main class="app-page">
    <div class="main-shell">
      <section class="main-header-hero">
        <div class="main-hero-bg"></div>

        <div class="main-hero-top">
          <div>
            <div class="main-eyebrow">AION2 · ADMIN</div>
            <h1 class="main-page-title">일정 관리</h1>
            <p class="main-page-desc">운영진 전용 인증 화면입니다</p>
          </div>

          <button type="button" class="btn btn-secondary header-btn" id="backButton">메인으로</button>
        </div>
      </section>

      <section class="main-grid">
        <article class="main-card">
          <div class="card-head">
            <h2 class="section-title">관리자 확인</h2>
          </div>

          <div class="form-group">
            <label class="input-label" for="adminCode">관리자 코드</label>
            <input
              class="main-input"
              type="password"
              id="adminCode"
              placeholder="관리자 코드를 입력해주세요"
              autocomplete="off"
              maxlength="30"
            />
          </div>

          <button type="button" class="main-button" id="loginButton">확인하기</button>
          <div class="page-message" id="loginMessage">관리자 코드 입력 후 진행해주세요.</div>
        </article>
      </section>
    </div>
  </main>

  <script src="./js/admin-login.js"></script>
</body>
</html>
