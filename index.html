<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NSB Guild</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg1: #0b1020;
      --bg2: #151d35;
      --card: rgba(15, 23, 42, 0.88);
      --card-soft: rgba(30, 41, 59, 0.78);
      --line: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --sub: #cbd5e1;
      --point: #60a5fa;
      --point2: #38bdf8;
      --btn-dark: #1e293b;
      --danger: #f87171;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text);
      background:
        linear-gradient(135deg, rgba(9, 14, 28, 0.92), rgba(21, 29, 53, 0.88)),
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.14), transparent 24%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .shell {
      width: 100%;
      max-width: 1120px;
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 20px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .left-panel {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 640px;
      background:
        linear-gradient(180deg, rgba(15, 23, 42, 0.72), rgba(15, 23, 42, 0.92)),
        url("https://drive.google.com/uc?export=view&id=1hkPAg6h-o8VFxuEbWPhf8UydAsAlpBSn") center/cover no-repeat;
      position: relative;
      overflow: hidden;
    }

    .left-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(8, 15, 30, 0.15), rgba(8, 15, 30, 0.6));
      pointer-events: none;
    }

    .left-inner {
      position: relative;
      z-index: 1;
    }

    .logo-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 108px;
      height: 108px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(6px);
      margin-bottom: 22px;
      overflow: hidden;
    }

    .logo-wrap img {
      width: 84px;
      height: 84px;
      object-fit: contain;
      display: block;
    }

    .eyebrow {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(96, 165, 250, 0.14);
      border: 1px solid rgba(96, 165, 250, 0.2);
      color: #dbeafe;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
      margin-bottom: 16px;
    }

    .title {
      margin: 0 0 12px;
      font-size: 38px;
      line-height: 1.18;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .desc {
      margin: 0;
      color: var(--sub);
      font-size: 15px;
      line-height: 1.7;
      word-break: keep-all;
    }

    .feature-list {
      margin-top: 30px;
      display: grid;
      gap: 12px;
    }

    .feature-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .feature-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--point), var(--point2));
      margin-top: 6px;
      flex: 0 0 auto;
    }

    .feature-text {
      color: #e2e8f0;
      font-size: 14px;
      line-height: 1.6;
    }

    .right-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 640px;
    }

    .form-head {
      margin-bottom: 24px;
    }

    .form-title {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .form-sub {
      margin: 0;
      color: var(--sub);
      font-size: 14px;
      line-height: 1.6;
      word-break: keep-all;
    }

    .form-card {
      background: var(--card-soft);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-title {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 700;
    }

    .label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: #dbeafe;
      font-weight: 600;
    }

    .input {
      width: 100%;
      height: 52px;
      padding: 0 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(15, 23, 42, 0.9);
      color: #fff;
      outline: none;
      font-size: 15px;
      transition: 0.2s ease;
    }

    .input::placeholder {
      color: #94a3b8;
    }

    .input:focus {
      border-color: rgba(96, 165, 250, 0.6);
      box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.12);
    }

    .btn {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      cursor: pointer;
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      transition: transform 0.12s ease, opacity 0.2s ease;
    }

    .btn:active {
      transform: scale(0.99);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--point), var(--point2));
      margin-top: 14px;
    }

    .btn-secondary {
      background: linear-gradient(135deg, #334155, var(--btn-dark));
      margin-top: 14px;
    }

    .result {
      min-height: 22px;
      margin-top: 10px;
      font-size: 13px;
      color: var(--sub);
      line-height: 1.5;
    }

    .result.error {
      color: var(--danger);
    }

    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      margin: 18px 0;
    }

    .footer-note {
      margin-top: 8px;
      color: #94a3b8;
      font-size: 12px;
      line-height: 1.6;
    }

    .mobile-logo {
      display: none;
      justify-content: center;
      margin-bottom: 18px;
    }

    .mobile-logo .logo-wrap {
      margin-bottom: 0;
      width: 92px;
      height: 92px;
    }

    .mobile-logo img {
      width: 70px;
      height: 70px;
    }

    @media (max-width: 980px) {
      .shell {
        grid-template-columns: 1fr;
        max-width: 640px;
      }

      .left-panel {
        min-height: auto;
        padding-bottom: 24px;
      }

      .right-panel {
        min-height: auto;
      }

      .title {
        font-size: 30px;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 14px;
      }

      .panel {
        border-radius: 20px;
        padding: 20px;
      }

      .left-panel {
        display: none;
      }

      .right-panel {
        min-height: auto;
      }

      .mobile-logo {
        display: flex;
      }

      .form-title {
        font-size: 24px;
      }

      .form-card {
        padding: 16px;
        border-radius: 16px;
      }

      .input,
      .btn {
        height: 50px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="shell">
      <article class="panel left-panel">
        <div class="left-inner">
          <div class="eyebrow">NSB GUILD RAID MANAGER</div>

          <div class="logo-wrap">
            <img
              id="logoImagePc"
              src="https://drive.google.com/uc?export=view&id=1hkPAg6h-o8VFxuEbWPhf8UydAsAlpBSn"
              alt="길드 로고"
            />
          </div>

          <h1 class="title" id="siteTitle">NSB 길드 페이지</h1>
          <p class="desc" id="noticeText">
            요일별, 시간별 가능 캐릭터를 모아서 파티를 편성하고 주차별 참여 현황까지 관리할 수 있는 길드 전용 페이지입니다.
          </p>

          <div class="feature-list">
            <div class="feature-item">
              <div class="feature-dot"></div>
              <div class="feature-text">본캐명 기준으로 로그인 후 내 캐릭터 정보를 확인</div>
            </div>
            <div class="feature-item">
              <div class="feature-dot"></div>
              <div class="feature-text">요일·시간 기준으로 가능한 캐릭터 취합</div>
            </div>
            <div class="feature-item">
              <div class="feature-dot"></div>
              <div class="feature-text">관리자가 파티를 직접 편성하고 참여 이력 관리</div>
            </div>
          </div>
        </div>
      </article>

      <article class="panel right-panel">
        <div class="mobile-logo">
          <div class="logo-wrap">
            <img
              id="logoImageMobile"
              src="https://drive.google.com/uc?export=view&id=1hkPAg6h-o8VFxuEbWPhf8UydAsAlpBSn"
              alt="길드 로고"
            />
          </div>
        </div>

        <div class="form-head">
          <h2 class="form-title" id="loginTitle">로그인</h2>
          <p class="form-sub" id="loginDesc">
            본캐명을 입력해서 길드 페이지에 입장해주세요.
          </p>
        </div>

        <div class="form-card">
          <h3 class="card-title">길드원 입장</h3>
          <label class="label" for="mainName">본캐명</label>
          <input
            class="input"
            type="text"
            id="mainName"
            placeholder="본캐명을 입력해주세요"
            autocomplete="off"
          />
          <button class="btn btn-primary" id="loginButton">입장하기</button>
          <div class="result" id="loginResult"></div>
        </div>

        <div class="divider"></div>

        <div class="form-card">
          <h3 class="card-title" id="adminEnterTitle">관리자 입장</h3>
          <label class="label" for="adminCode">관리자 코드</label>
          <input
            class="input"
            type="password"
            id="adminCode"
            placeholder="관리자 코드를 입력해주세요"
            autocomplete="off"
          />
          <button class="btn btn-secondary" id="adminButton">관리자 페이지 입장</button>
          <div class="result" id="adminResult"></div>
        </div>

        <div class="footer-note">
          로그인 후 길드원 화면으로 이동하고, 관리자 코드를 입력하면 관리자 전용 화면으로 이동하게 붙일 예정이야.
        </div>
      </article>
    </section>
  </main>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwOlszRW-sCVG7WH8hlWcwULUqg44KNg2u3ASgp16itsVEZpfRtNoFGnkiB0-uqBIqnFA/exec";

    async function callApi(params = {}) {
      const url = new URL(SCRIPT_URL);
      Object.entries(params).forEach(([key, value]) => {
        url.searchParams.set(key, value);
      });
      const res = await fetch(url.toString());
      return await res.json();
    }

    function setMessage(targetId, message = "", isError = false) {
      const el = document.getElementById(targetId);
      el.textContent = message;
      el.classList.toggle("error", isError);
    }

    async function initPage() {
      try {
        const data = await callApi({ action: "init" });
        if (!data.ok) return;

        const text = data.text || {};
        const image = data.image || {};

        document.getElementById("siteTitle").textContent = text.site_title || "NSB 길드 페이지";
        document.getElementById("noticeText").textContent =
          text.notice_text || "길드 전용 페이지에 오신 걸 환영합니다.";
        document.getElementById("loginTitle").textContent = text.login_title || "로그인";
        document.getElementById("loginDesc").textContent =
          text.login_desc || "본캐명을 입력해서 길드 페이지에 입장해주세요.";
        document.getElementById("mainName").placeholder =
          text.login_placeholder || "본캐명을 입력해주세요";
        document.getElementById("loginButton").textContent =
          text.login_button || "입장하기";
        document.getElementById("adminEnterTitle").textContent =
          text.admin_enter_title || "관리자 입장";
        document.getElementById("adminCode").placeholder =
          text.admin_code_placeholder || "관리자 코드를 입력해주세요";
        document.getElementById("adminButton").textContent =
          text.admin_button || "관리자 페이지 입장";

        if (image.IMG_LOGO && image.IMG_LOGO.url) {
          document.getElementById("logoImagePc").src = image.IMG_LOGO.url;
          document.getElementById("logoImageMobile").src = image.IMG_LOGO.url;
        }
      } catch (e) {
        console.log(e);
      }
    }

    async function login() {
      const mainName = document.getElementById("mainName").value.trim();

      if (!mainName) {
        setMessage("loginResult", "본캐명을 입력해주세요.", true);
        return;
      }

      try {
        const data = await callApi({ action: "login", mainName });

        if (!data.ok) {
          setMessage("loginResult", data.message || "로그인에 실패했습니다.", true);
          return;
        }

        setMessage("loginResult", data.message || "로그인되었습니다.");
        alert("로그인 성공. 다음 단계에서 길드원 메인 화면으로 연결하면 돼.");
      } catch (e) {
        setMessage("loginResult", "로그인 중 오류가 발생했습니다.", true);
      }
    }

    async function adminLogin() {
      const adminCode = document.getElementById("adminCode").value.trim();

      if (!adminCode) {
        setMessage("adminResult", "관리자 코드를 입력해주세요.", true);
        return;
      }

      try {
        const data = await callApi({ action: "adminLogin", adminCode });

        if (!data.ok) {
          setMessage("adminResult", data.message || "관리자 인증 실패", true);
          return;
        }

        setMessage("adminResult", data.message || "관리자 인증 완료");
        alert("관리자 인증 성공. 다음 단계에서 관리자 화면으로 연결하면 돼.");
      } catch (e) {
        setMessage("adminResult", "관리자 인증 중 오류가 발생했습니다.", true);
      }
    }

    document.getElementById("loginButton").addEventListener("click", login);
    document.getElementById("adminButton").addEventListener("click", adminLogin);

    document.getElementById("mainName").addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });

    document.getElementById("adminCode").addEventListener("keydown", (e) => {
      if (e.key === "Enter") adminLogin();
    });

    initPage();
  </script>
</body>
</html>
