<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoStepBack - 메인</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="page">
    <div class="main-shell">

      <header class="main-header">
        <div>
          <div class="main-eyebrow">AION2</div>
          <h1 class="main-page-title" id="mainTitle">이번 주 일정</h1>
          <p class="main-page-desc" id="mainDesc">가능한 시간 확인 후 인원 맞는 쪽으로 정리할 수 있습니다</p>
        </div>

        <button class="btn btn-secondary header-btn" id="logoutButton">로그아웃</button>
      </header>

      <section class="main-grid">

        <!-- 내 상태 -->
        <article class="main-card">
          <h2 class="section-title" id="sectionMyInfo">내 상태</h2>

          <div class="info-list">
            <div class="info-row">
              <span class="info-label">본캐명</span>
              <strong class="info-value" id="accountMainName">-</strong>
            </div>

            <div class="info-row">
              <span class="info-label">등록 캐릭</span>
              <strong class="info-value" id="characterCount">0</strong>
            </div>

            <div class="info-row">
              <span class="info-label">이번 주 선택</span>
              <strong class="info-value" id="selectedCount">0개</strong>
            </div>

            <div class="info-row">
              <span class="info-label">이번 주 참여</span>
              <strong class="info-value" id="weeklyRunCount">0 / 2</strong>
            </div>
          </div>
        </article>

        <!-- 이번 주 요약 -->
        <article class="main-card">
          <h2 class="section-title" id="sectionSummary">이번 주 요약</h2>

          <div class="summary-list">
            <div class="summary-item">
              <div class="summary-title">추천 시간</div>
              <div class="summary-main" id="bestTimeText">집계 중</div>
              <div class="summary-sub" id="bestTimeSub">인원과 조합 기준으로 가장 무난한 시간입니다</div>
            </div>

            <div class="summary-item">
              <div class="summary-title">부족한 시간</div>
              <div class="summary-main" id="weakTimeText">집계 중</div>
              <div class="summary-sub" id="weakTimeSub">아직 인원이 적거나 구성이 부족한 시간입니다</div>
            </div>
          </div>
        </article>

        <!-- 캐릭터 -->
        <article class="main-card">
          <div class="card-head">
            <h2 class="section-title" id="sectionCharacter">캐릭터</h2>
            <button class="mini-btn" id="addCharacterButton">캐릭터 추가</button>
          </div>

          <div class="character-list" id="characterList">
            <div class="character-item">
              <div>
                <div class="character-name">불러오는 중...</div>
                <div class="character-meta">캐릭터 정보를 불러오고 있습니다</div>
              </div>
              <div class="character-badge off">대기</div>
            </div>
          </div>
        </article>

        <!-- 빠른 이동 -->
        <article class="main-card">
          <h2 class="section-title" id="sectionQuickMenu">빠른 이동</h2>

          <div class="quick-menu">
            <button class="btn btn-primary" id="goAvailabilityButton">시간 선택</button>
            <button class="btn btn-secondary" id="goPartyButton">조합 보기</button>
            <button class="btn btn-secondary" id="goHistoryButton">참여 내역</button>
            <button class="btn btn-secondary" id="goAdminButton">일정 관리</button>
          </div>
        </article>

      </section>
    </div>
  </main>

  <script src="./js/main.js"></script>
</body>
</html>
