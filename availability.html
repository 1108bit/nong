<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoStepBack - 시간 선택</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="page">
    <div class="main-shell">

      <header class="main-header">
        <div>
          <div class="main-eyebrow">AION2</div>
          <h1 class="main-page-title">시간 선택</h1>
          <p class="main-page-desc">가능한 시간을 고르면 바로 반영됩니다</p>
        </div>

        <button class="btn btn-secondary header-btn" id="backButton">메인으로</button>
      </header>

      <section class="main-grid availability-grid">

        <!-- 상단 요약 -->
        <article class="main-card">
          <h2 class="section-title">내 상태</h2>

          <div class="info-list">
            <div class="info-row">
              <span class="info-label">본캐명</span>
              <strong class="info-value" id="mainNameText">-</strong>
            </div>

            <div class="info-row">
              <span class="info-label">선택 캐릭터</span>
              <strong class="info-value" id="selectedCharacterText">-</strong>
            </div>

            <div class="info-row">
              <span class="info-label">이번 주 선택</span>
              <strong class="info-value" id="selectedCountText">0개</strong>
            </div>
          </div>

          <div class="availability-top-actions">
            <select id="characterSelect" class="character-select"></select>
            <button class="btn btn-secondary" id="refreshButton">지금 상태 보기</button>
          </div>

          <div class="page-message" id="pageMessage">불러오는 중...</div>
        </article>

        <!-- 시간 목록 -->
        <article class="main-card availability-card-full">
          <div class="card-head">
            <h2 class="section-title">이번 주 시간</h2>
            <div class="mini-guide">추천 / 부족 / 과밀 상태를 바로 확인할 수 있습니다</div>
          </div>

          <div class="availability-list" id="availabilityList">
            <div class="availability-empty">불러오는 중...</div>
          </div>
        </article>

      </section>
    </div>
  </main>

  <script src="./js/availability.js"></script>
</body>
</html>
