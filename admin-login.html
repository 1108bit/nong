<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 인증</title>
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    .admin-login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background:
        radial-gradient(circle at top, rgba(0, 212, 255, 0.12), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.08), transparent 22%),
        linear-gradient(180deg, #020617 0%, #0f172a 100%);
    }

    .admin-login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 28px;
      padding: 28px 20px 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
    }

    .admin-login-title {
      margin: 0 0 8px;
      font-size: 26px;
      font-weight: 800;
      color: #111827;
    }

    .admin-login-desc {
      margin: 0 0 18px;
      font-size: 14px;
      color: #6b7280;
    }

    .admin-login-message {
      min-height: 20px;
      margin-top: 12px;
      text-align: center;
      font-size: 13px;
      color: #64748b;
    }

    .admin-login-message.error {
      color: #f87171;
    }

    .admin-login-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .admin-login-actions .btn {
      flex: 1;
    }
  </style>
</head>
<body>
  <main class="admin-login-page">
    <section class="admin-login-card">
      <h1 class="admin-login-title">관리자 인증</h1>
      <p class="admin-login-desc">관리자 코드 입력 후 일정 관리 화면으로 이동합니다</p>

      <div class="form-group">
        <label class="input-label" for="adminCode">관리자 코드</label>
        <input
          class="main-input"
          type="password"
          id="adminCode"
          placeholder="관리자 코드를 입력해주세요"
          autocomplete="off"
        />
      </div>

      <div class="admin-login-actions">
        <button class="btn btn-secondary" id="backButton">뒤로가기</button>
        <button class="btn btn-primary" id="loginButton">확인</button>
      </div>

      <div class="admin-login-message" id="loginMessage"></div>
    </section>
  </main>

  <script src="./js/admin-login.js"></script>
</body>
</html>
