<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoStepBack - 조합 보기</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="page">
    <div class="main-shell">

      <header class="main-header">
        <div>
          <div class="main-eyebrow">AION2</div>
          <h1 class="main-page-title">조합 보기</h1>
          <p class="main-page-desc">시간별 인원과 추천 조합을 확인할 수 있습니다</p>
        </div>

        <button class="btn btn-secondary header-btn" id="backButton">메인으로</button>
      </header>

      <section class="main-grid party-grid">

        <!-- 시간 선택 -->
        <article class="main-card party-card-full">
          <div class="card-head">
            <h2 class="section-title">시간 선택</h2>
            <button class="btn btn-secondary party-refresh-btn" id="refreshButton">지금 상태 보기</button>
          </div>

          <div class="page-message" id="pageMessage">불러오는 중...</div>

          <div class="party-summary-list" id="summaryGrid">
            <div class="availability-empty">불러오는 중...</div>
          </div>
        </article>

        <!-- 현재 상태 -->
        <article class="main-card">
          <h2 class="section-title">현재 상태</h2>

          <div class="info-list">
            <div class="info-row">
              <span class="info-label">선택 시간</span>
              <strong class="info-value" id="statusTime">선택 전</strong>
            </div>

            <div class="info-row">
              <span class="info-label">판단</span>
              <strong class="info-value" id="statusClear">-</strong>
            </div>

            <div class="info-row">
              <span class="info-label">추천 인원</span>
              <strong class="info-value" id="statusPicked">0</strong>
            </div>

            <div class="info-row">
              <span class="info-label">400+ 인원</span>
              <strong class="info-value" id="status400">0</strong>
            </div>

            <div class="info-row">
              <span class="info-label">2파티 치유</span>
              <strong class="info-value" id="statusParty2Heal">-</strong>
            </div>
          </div>

          <div class="quick-menu single-action">
            <button class="btn btn-primary" id="autoMatchButton">지금 조합 보기</button>
          </div>
        </article>

        <!-- 1파티 -->
        <article class="main-card">
          <div class="card-head">
            <h2 class="section-title">1파티</h2>
            <div class="party-badges" id="party1Badges"></div>
          </div>

          <div class="party-member-list" id="party1List">
            <div class="availability-empty">시간을 먼저 선택해주세요.</div>
          </div>
        </article>

        <!-- 2파티 -->
        <article class="main-card">
          <div class="card-head">
            <h2 class="section-title">2파티</h2>
            <div class="party-badges" id="party2Badges"></div>
          </div>

          <div class="party-member-list" id="party2List">
            <div class="availability-empty">조합 결과가 여기에 표시됩니다.</div>
          </div>
        </article>

      </section>
    </div>
  </main>

  <script src="./js/party.js"></script>
</body>
</html>
