<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 일정 관리</title>
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    .admin-page {
      min-height: 100vh;
      padding: 24px 16px 40px;
      background:
        radial-gradient(circle at top, rgba(0, 212, 255, 0.12), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.08), transparent 22%),
        linear-gradient(180deg, #020617 0%, #0f172a 100%);
    }

    .admin-shell {
      max-width: 1100px;
      margin: 0 auto;
    }

    .admin-card {
      background: linear-gradient(180deg, rgba(8, 15, 28, 0.82) 0%, rgba(10, 18, 32, 0.72) 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(16px);
      margin-bottom: 16px;
    }

    .admin-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .admin-title {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      color: #f8fafc;
    }

    .admin-desc {
      margin: 8px 0 0;
      color: #94a3b8;
      font-size: 14px;
    }

    .admin-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .admin-input,
    .admin-select {
      width: 100%;
      height: 50px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #f8fafc;
      padding: 0 14px;
      font-size: 14px;
      outline: none;
    }

    .admin-table {
      display: grid;
      gap: 10px;
    }

    .admin-row {
      display: grid;
      grid-template-columns: 120px 100px 120px 90px 1fr 90px 110px;
      gap: 10px;
      align-items: center;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .admin-head {
      color: #94a3b8;
      font-size: 12px;
      font-weight: 700;
    }

    .admin-cell {
      color: #f8fafc;
      font-size: 14px;
      word-break: break-word;
    }

    .admin-badge {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 32px;
      border-radius: 999px;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 800;
      background: rgba(0, 212, 255, 0.12);
      color: #a5f3fc;
      border: 1px solid rgba(0, 212, 255, 0.2);
    }

    .admin-badge.off {
      background: rgba(248, 113, 113, 0.12);
      color: #fecaca;
      border-color: rgba(248, 113, 113, 0.2);
    }

    .admin-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .admin-message {
      min-height: 22px;
      margin-top: 12px;
      color: #94a3b8;
      font-size: 13px;
    }

    .admin-message.error {
      color: #f87171;
    }

    @media (max-width: 980px) {
      .admin-grid {
        grid-template-columns: 1fr 1fr;
      }

      .admin-row {
        grid-template-columns: 1fr;
      }

      .admin-head {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="admin-page">
    <div class="admin-shell">
      <section class="admin-card">
        <div class="admin-top">
          <div>
            <h1 class="admin-title">관리자 일정 관리</h1>
            <p class="admin-desc">주간 레이드 일정 열기 / 닫기 / 추가 / 삭제</p>
          </div>
          <button class="btn btn-secondary" id="backButton">뒤로가기</button>
        </div>

        <div class="admin-grid">
          <input type="date" id="weekKeyInput" class="admin-input" />
          <input type="date" id="dateInput" class="admin-input" />
          <select id="dayInput" class="admin-select">
            <option value="수">수</option>
            <option value="목">목</option>
            <option value="금">금</option>
            <option value="토">토</option>
            <option value="일">일</option>
            <option value="월">월</option>
            <option value="화">화</option>
          </select>
          <input type="text" id="timeSlotInput" class="admin-input" placeholder="예: 21:00" />
          <input type="text" id="noteInput" class="admin-input" placeholder="메모" />
          <input type="number" id="sortInput" class="admin-input" placeholder="정렬순서" />
          <select id="openYnInput" class="admin-select">
            <option value="Y">열기</option>
            <option value="N">닫기</option>
          </select>
          <button class="btn btn-primary" id="addButton">일정 추가</button>
          <button class="btn btn-secondary" id="loadButton">불러오기</button>
        </div>

        <div class="admin-message" id="adminMessage"></div>
      </section>

      <section class="admin-card">
        <div class="admin-table" id="scheduleList">
          <div class="admin-row admin-head">
            <div>주간키</div>
            <div>요일</div>
            <div>시간</div>
            <div>상태</div>
            <div>메모</div>
            <div>정렬</div>
            <div>관리</div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="./js/admin.js"></script>
</body>
</html>
